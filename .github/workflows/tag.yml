name: Tag

on:
  push:
    tags:
      - 'v*'

jobs:
  verify-dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Ensure dist is tracked and matches source
        run: |
          if git check-ignore -q dist/index.js 2>/dev/null; then
            echo "::error::dist/ is gitignored. The host installs from the Git tag snapshot; dist/ must be committed."
            exit 1
          fi
          if ! git ls-files --error-unmatch dist/index.js >/dev/null 2>&1; then
            echo "::error::dist/ is not in git. Run: npm run build && git add dist && git commit -m \"Build dist\" then tag."
            exit 1
          fi
          git diff --exit-code dist
